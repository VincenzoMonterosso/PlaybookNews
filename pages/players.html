<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <link rel="stylesheet" href="/styles.css" />
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
        <style>
            body {
                color: white;
            }

            .panel {
                margin-top: 2.25rem;
                border: 1px solid var(--team-secondary, rgba(255, 255, 255, 0.65)) !important;
                border-radius: 12px;
                background: rgba(0, 0, 0, 0.35);
                box-shadow: 0 12px 32px rgba(0, 0, 0, 0.25);
                overflow: hidden;
            }

            .table-wrap {
                overflow-x: auto;
            }

            .players-table {
                color: #fff !important;
                margin-bottom: 0;
                --bs-table-color: #fff;
                --bs-table-bg: #000;
                --bs-table-striped-color: #fff;
                --bs-table-striped-bg: #000;
                --bs-table-hover-color: #fff;
                --bs-table-hover-bg: #111;
                --bs-table-border-color: rgba(255, 255, 255, 0.18);
            }

            .players-table > :not(caption) > * > * {
                background-color: #000 !important;
                color: #fff !important;
                text-shadow: none !important;
            }

            .players-table thead th {
                border-bottom-color: rgba(255, 255, 255, 0.35);
                white-space: nowrap;
            }

            .players-table td {
                white-space: nowrap;
                border-top-color: rgba(255, 255, 255, 0.18);
            }
        </style>
        <title>PlaybookNews</title>
    </head>
    <body>
        <!-- Navigation bar -->
        <div>
            <nav id="nav">
                <ul>
                    <li><b>PlaybookNews</b></li>
                    <li><a href="./">Home</a></li>
                    <li><a href="/dashboard" class="log" id="change1">Dashboard</a></li>
                    <li><a href="/news" class="log" id="change2">News</a></li>
                    <li><a href="/teams" class="log" id="change3">Teams</a></li>
                    <li><a href="/players" class="log">Players</a></li>
                    <li><a href="/schedule" class="log">Schedule</a></li>
                    <li><a href="/stats" class="log">Stats</a></li>
                    <li class="drop" id="user-dropdown" style="display:none">
                        <button type="button" class="drop-btn log" id="user-btn">
                        <span id="user" style="text-shadow: 5px 5px 4px black;"></span>
                        </button>
                        <ul class="drop-menu" id="user-menu">
                        <li><a href="/settings">Settings</a></li>
                        <li><a href="/logout">Logout</a></li>
                        </ul>
                    </li>
                </ul>
            </nav>
        </div>
        <main class="container py-4">
            <h1 class="mb-3">Top Players</h1>
            <p class="text-white-50 mb-0" id="players-subtitle">Loading preferred team players...</p>
            <div class="panel mt-3">
                <div class="table-wrap">
                    <table class="table players-table table-sm align-middle">
                        <thead>
                            <tr>
                                <th>Player</th>
                                <th>Pos</th>
                                <th>GP</th>
                                <th>TDs</th>
                                <th>Pass Yds</th>
                                <th>Rush Yds</th>
                                <th>Rec Yds</th>
                                <th>Tackles</th>
                            </tr>
                        </thead>
                        <tbody id="players-body">
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
        <script>
            function formatValue(value) {
                return value === null || value === undefined || value === "" ? "--" : String(value);
            }

            function formatStat(value) {
                if (value === null || value === undefined || value === "") return "--";
                const num = Number(value);
                if (!Number.isFinite(num)) return formatValue(value);
                return Number.isInteger(num) ? String(num) : String(Number(num.toFixed(2)));
            }

            function createPlayerRow(player) {
                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td>${formatValue(player.name)}</td>
                    <td>${formatValue(player.position)}</td>
                    <td>${formatStat(player.gamesPlayed)}</td>
                    <td>${formatStat(player.totalTouchdowns)}</td>
                    <td>${formatStat(player.passingYards)}</td>
                    <td>${formatStat(player.rushingYards)}</td>
                    <td>${formatStat(player.receivingYards)}</td>
                    <td>${formatStat(player.tackles)}</td>
                `;
                return tr;
            }

            function renderPlayers(players) {
                const body = document.getElementById("players-body");
                body.innerHTML = "";

                if (!Array.isArray(players) || players.length === 0) {
                    const tr = document.createElement("tr");
                    tr.innerHTML = `<td colspan="8" class="text-white-50">No player data available.</td>`;
                    body.appendChild(tr);
                    return;
                }

                players.forEach((player) => body.appendChild(createPlayerRow(player)));
            }

            (async () => {
                try {
                    const res = await fetch('/api/preferred-data?include=players', { credentials: 'include' });
                    if (!res.ok) throw new Error("not logged in");
                    const data = await res.json();

                    document.getElementById('user').textContent = data?.username || '';
                    const dropEl = document.getElementById('user-dropdown');
                    if (dropEl) dropEl.style.display = 'block';

                    const team = data?.team;
                    if (team?.colors?.[0]) {
                        document.getElementById('nav').style.background = `linear-gradient(to bottom, ${team.colors[0]}, rgba(0,0,0,0))`;
                    }
                    if (team?.colors?.[1]) {
                        document.documentElement.style.setProperty('--team-secondary', team.colors[1]);
                    }

                    const preferredTeam = data?.preferences?.team || "Preferred Team";
                    document.getElementById("players-subtitle").textContent = `Showing top players for ${preferredTeam}.`;
                    renderPlayers(data?.players || []);
                } catch (err) {
                    // User is not logged in: hide gated nav items and show login/signup links.
                    document.querySelectorAll('.log').forEach(el => el.textContent = '');
                    document.getElementById('change1').textContent = 'Login';
                    document.getElementById('change1').href = '/login';
                    document.getElementById('change2').textContent = 'Sign Up';
                    document.getElementById('change2').href = '/signup';
                    const dropEl = document.getElementById('user-dropdown');
                    if (dropEl) dropEl.style.display = 'none';
                    document.getElementById("players-subtitle").textContent = "Log in to view player data.";
                    renderPlayers([]);
                }
            })();
        </script>
    </body>
</html>
